<!DOCTYPE html>
<html>
<head>
    <title>Consultants Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h1, h2 {
            color: #333;
        }

        /* --- Form Box --- */
        .form-container {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .form-container input, .form-container select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-container input.input-error {
            border-color: #e74c3c;
            background-color: #fceae9;
        }

        .form-container button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
        }

        .form-container button:hover {
            background-color: #2980b9;
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: -8px;
            margin-bottom: 5px;
        }

        .success-message {
            color: #27ae60;
            font-size: 14px;
            margin: 10px 0;
        }

        /* --- Search --- */
        .search-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        #searchInput {
            flex: 1;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        #searchField {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        /* --- Consultant Cards --- */
        .consultant-card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s all;
        }

        .consultant-card:hover {
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
        }

        .consultant-info span {
            display: block;
            font-size: 14px;
        }

        .card-buttons button {
            margin-left: 5px;
            padding: 6px 12px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 13px;
        }

        .card-buttons .edit-btn {
            background-color: #f39c12;
            color: #fff;
        }

        .card-buttons .edit-btn:hover {
            background-color: #e67e22;
        }

        .card-buttons .delete-btn {
            background-color: #e74c3c;
            color: #fff;
        }

        .card-buttons .delete-btn:hover {
            background-color: #c0392b;
        }

        @media(max-width: 600px) {
            .form-container { width: 100%; }
            #searchInput { width: 100%; }
        }
    </style>
</head>
<body>

<h1>Consultants Dashboard</h1>

<div class="form-container">
    <h2 id="formTitle">Add Consultant</h2>

    <input id="id" type="hidden">

    <div>
        <input id="firstName" placeholder="First Name">
        <div id="firstNameError" class="error-message"></div>
    </div>

    <div>
        <input id="lastName" placeholder="Last Name">
        <div id="lastNameError" class="error-message"></div>
    </div>

    <div>
        <input id="email" placeholder="Email">
        <div id="emailError" class="error-message"></div>
    </div>

    <div>
        <input id="expertise" placeholder="Expertise">
        <div id="expertiseError" class="error-message"></div>
    </div>

    <div>
        <input id="age" type="number" placeholder="Age">
        <div id="ageError" class="error-message"></div>
    </div>

    <button onclick="saveConsultant()">Save</button>
    <div id="successMessage" class="success-message"></div>
</div>

<div class="search-container">
    <input id="searchInput" placeholder="Search...">
    <select id="searchField">
        <option value="all">All fields</option>
        <option value="firstName">First Name</option>
        <option value="lastName">Last Name</option>
        <option value="email">Email</option>
        <option value="expertise">Expertise</option>
        <option value="age">Age</option>
        <option value="id">ID</option>
    </select>
    <button onclick="searchConsultants()">Search</button>
</div>

<div id="list"></div>

<script>
    const API = "/api/consultants";
    let allConsultants = [];

    function loadConsultants() {
        fetch(API)
            .then(res => res.json())
            .then(data => {
                allConsultants = data;
                renderList(allConsultants);
            });
    }

    function renderList(list) {
        const container = document.getElementById("list");
        container.innerHTML = "";
        list.forEach(c => {
            const div = document.createElement("div");
            div.className = "consultant-card";
            div.innerHTML = `
            <div class="consultant-info">
                <span><strong>${c.firstName} ${c.lastName}</strong> (${c.expertise})</span>
                <span>Email: ${c.email}</span>
                <span>Age: ${c.age}</span>
                <span>ID: ${c.id}</span>
            </div>
            <div class="card-buttons">
                <button class="edit-btn" onclick="editConsultant(${c.id})">Edit</button>
                <button class="delete-btn" onclick="deleteConsultant(${c.id})">Delete</button>
            </div>
        `;
            container.appendChild(div);
        });
    }

    function clearErrors() {
        ["firstName","lastName","email","expertise","age"].forEach(f => {
            document.getElementById(f+"Error").innerText = "";
            document.getElementById(f).classList.remove("input-error");
        });
        document.getElementById("successMessage").innerText = "";
    }

    function saveConsultant() {
        const id = document.getElementById("id").value;

        const consultant = {
            id: id || undefined,
            firstName: document.getElementById("firstName").value.trim(),
            lastName: document.getElementById("lastName").value.trim(),
            email: document.getElementById("email").value.trim(),
            expertise: document.getElementById("expertise").value.trim(),
            age: parseInt(document.getElementById("age").value)
        };

        clearErrors();

        const method = id ? "PATCH" : "POST";
        const url = id ? API + "/" + id : API;

        fetch(url, {
            method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(consultant)
        })
            .then(async res => {
                if (!res.ok) {
                    const text = await res.text();
                    // Try to parse JSON validation errors
                    try {
                        const json = JSON.parse(text);
                        if (json.errors) {
                            json.errors.forEach(err => {
                                if(err.field && document.getElementById(err.field + "Error")) {
                                    document.getElementById(err.field + "Error").innerText = err.defaultMessage;
                                    document.getElementById(err.field).classList.add("input-error");
                                }
                            });
                        } else {
                            document.getElementById("emailError").innerText = text;
                        }
                    } catch(e) {
                        document.getElementById("emailError").innerText = text;
                    }
                    throw new Error("Validation failed");
                }
                return res.json();
            })
            .then(() => {
                document.getElementById("successMessage").innerText = id ? "Consultant updated successfully!" : "Consultant created successfully!";
                resetForm();
            })
            .catch(err => {
                console.log(err);
            });
    }

    function editConsultant(id) {
        fetch(API + "/" + id)
            .then(res => res.json())
            .then(c => {
                document.getElementById("id").value = c.id;
                document.getElementById("firstName").value = c.firstName;
                document.getElementById("lastName").value = c.lastName;
                document.getElementById("email").value = c.email;
                document.getElementById("expertise").value = c.expertise;
                document.getElementById("age").value = c.age;
                document.getElementById("formTitle").innerText = "Edit Consultant";
            });
    }

    function deleteConsultant(id) {
        fetch(API + "/" + id, { method: "DELETE" })
            .then(() => loadConsultants());
    }

    function resetForm() {
        document.getElementById("id").value = "";
        ["firstName","lastName","email","expertise","age"].forEach(f => document.getElementById(f).value = "");
        document.getElementById("formTitle").innerText = "Add Consultant";
        document.getElementById("successMessage").innerText = "";
        clearErrors();
        loadConsultants();
    }

    function searchConsultants() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        const field = document.getElementById("searchField").value;
        let filtered = allConsultants;

        if (q) {
            filtered = allConsultants.filter(c => {
                if (field === "all") {
                    return Object.values(c).some(v => v.toString().toLowerCase().includes(q));
                } else {
                    return c[field].toString().toLowerCase().includes(q);
                }
            });
        }
        renderList(filtered);
    }

    loadConsultants();
</script>

</body>
</html>
